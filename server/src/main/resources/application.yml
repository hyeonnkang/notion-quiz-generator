spring:
  application:
    name: notion-quiz-generator
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/notion_quiz?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b-instruct

notion:
  api:
    secret: ${NOTION_SECRET}
    version: "2022-06-28"
    base-url: "https://api.notion.com/v1"
